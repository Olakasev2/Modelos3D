<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Viewer OBJ</title>
  <style>
    body { margin: 0; }
    canvas { display: block; }
  </style>
</head>
  
<body>

<p>Hola</p>
  
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r160/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r160/examples/js/loaders/OBJLoader.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r160/examples/js/controls/OrbitControls.js"></script>
<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);

const camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth / window.innerHeight,
  0.1,
  10000
);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);

scene.add(new THREE.AxesHelper(5));
scene.add(new THREE.AmbientLight(0xffffff, 0.8));

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,10,10);
scene.add(light);

const loader = new THREE.OBJLoader();

loader.load('models/PowerSource.obj', function(object){

    object.traverse(function(child){
        if(child.isMesh){
            child.material = new THREE.MeshNormalMaterial();
        }
    });

    scene.add(object);

    const box = new THREE.Box3().setFromObject(object);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());

    object.position.sub(center);

    const maxDim = Math.max(size.x, size.y, size.z);
    const fov = camera.fov * (Math.PI / 180);
    let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));

    camera.position.z = cameraZ * 1.5;
    camera.lookAt(0,0,0);

});

function animate(){
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}
animate();
</script>

</body>

</html>
