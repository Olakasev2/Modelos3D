<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Viewer OBJ</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
    #instructions {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 15px;
      border-radius: 8px;
      font-family: Arial, sans-serif;
      font-size: 12px;
      line-height: 1.6;
      max-width: 200px;
      z-index: 10;
    }
    #instructions h3 {
      margin: 0 0 10px 0;
      font-size: 14px;
    }
    #instructions p {
      margin: 5px 0;
    }
  </style>
</head>
<body>

<div id="instructions">
  <h3>Controles</h3>
  <p>🖱️ Rotar: Click derecho + arrastrar</p>
  <p>🔍 Zoom: Rueda del ratón</p>
  <p>➡️ Mover: Click central + arrastrar</p>
  <p>⏎ Pantalla completa: F</p>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { OBJLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/OBJLoader.js";
import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x333333);

const camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth / window.innerHeight,
  0.1,
  10000
);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Controles para interactuar (rotar/zoom/pan)
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 0);

scene.add(new THREE.AxesHelper(5));
scene.add(new THREE.AmbientLight(0xffffff, 0.5));

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(15, 20, 15);
scene.add(light);

// Luz de lado para resaltar detalles/letras
const lightSide = new THREE.DirectionalLight(0xffffff, 0.8);
lightSide.position.set(-20, 5, 0);
scene.add(lightSide);

const loader = new OBJLoader();

loader.load('models/PowerSource.obj', function(object){

  object.traverse(function(child){
    if(child.isMesh){
      // Lambert para mejor contraste en detalles y letras
      child.material = new THREE.MeshLambertMaterial({
        color: 0x888888,
        emissive: 0x111111
      });
      child.receiveShadow = true;
    }
  });

  scene.add(object);

  // Centrar el objeto
  const box = new THREE.Box3().setFromObject(object);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  object.position.sub(center);

  // Ajustar cámara a tamaño del objeto
  const maxDim = Math.max(size.x, size.y, size.z);
  const fov = camera.fov * (Math.PI / 180);
  const cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));

  // Posición diagonal (arriba y a un lado)
  camera.position.set(cameraZ * 1.2, cameraZ * 0.8, cameraZ * 1.2);
  camera.lookAt(0,0,0);

  // IMPORTANTE: que el control rote alrededor del centro
  controls.target.set(0, 0, 0);
  controls.update();

  // Entrar en pantalla completa
  if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen().catch(err => {
      console.log('No se pudo activar fullscreen:', err);
    });
  }
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Tecla F para fullscreen
document.addEventListener('keydown', (e) => {
  if (e.key.toLowerCase() === 'f') {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(err => {
        console.log('No se pudo activar fullscreen:', err);
      });
    } else {
      document.exitFullscreen();
    }
  }
});

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>

</body>
</html>
